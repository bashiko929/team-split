<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Split - チーム費用集計管理</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f46e5">

<!-- iPhone対応 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TeamSplit">
<link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .btn-primary {
            background-color: #4f46e5;
            color: white;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background-color: #4338ca;
        }
        .btn-secondary {
            background-color: #f1f5f9;
            color: #475569;
            transition: all 0.2s;
        }
        .btn-secondary:hover {
            background-color: #e2e8f0;
        }
        .btn-chip {
            background-color: #eef2ff;
            color: #4f46e5;
            border: 1px solid #e0e7ff;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-chip:hover {
            background-color: #e0e7ff;
        }
        .filter-active {
            background-color: #4f46e5 !important;
            color: white !important;
        }
        button, select, input {
            min-height: 44px;
        }

        @media print {
            body { background: white; padding: 0; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .card { box-shadow: none; border: 1px solid #e2e8f0; margin-bottom: 2rem; }
            .max-w-2xl { max-width: 100%; width: 100%; }
            #memberSummaryContainer { background: white !important; border: 1px solid #e2e8f0; }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto">
        <header class="mb-8 text-center no-print">
            <h1 class="text-3xl font-bold text-slate-800">Team Split</h1>
            <p class="text-slate-500 text-sm">チーム費用 負担分集計システム</p>
            <div class="mt-4 flex flex-col items-center gap-2">
                <div class="flex justify-center gap-4">
                    <span class="text-[10px] text-emerald-600 bg-emerald-50 px-2 py-1 rounded-full border border-emerald-100">● ブラウザに自動保存中</span>
                    <button onclick="clearAllData()" class="text-[10px] text-red-500 hover:text-red-700 underline">全データをリセット</button>
                </div>
                <div class="flex gap-2 mt-1">
                    <input type="file" id="restoreInput" accept=".csv" class="hidden" onchange="importDataFromCSV(this)">
                    <button onclick="document.getElementById('restoreInput').click()" class="text-[10px] bg-slate-700 text-white px-3 py-1 rounded hover:bg-slate-800 font-bold">データ復元 (CSV読み込み)</button>
                </div>
            </div>
        </header>

        <!-- Step 1: Members -->
        <section class="card p-6 mb-6 border-t-4 border-indigo-500 no-print">
            <h2 class="text-lg font-semibold mb-4 flex items-center justify-between text-slate-800">
                <span class="flex items-center"><span class="mr-2">👥</span> <span id="memberFormTitle">メンバー名簿</span></span>
                <div class="flex gap-2">
                    <button onclick="downloadMemberTemplate()" class="text-[10px] bg-indigo-50 text-indigo-600 border border-indigo-100 px-2 py-1 rounded hover:bg-indigo-100 transition-colors">テンプレート保存</button>
                    <input type="file" id="csvInput" accept=".csv,.txt" class="hidden" onchange="handleCSV(this)">
                    <button onclick="document.getElementById('csvInput').click()" class="text-xs btn-secondary px-3 py-1 rounded-md">名簿のみ読込</button>
                </div>
            </h2>
            <div class="space-y-3 mb-4 p-3 bg-slate-50 rounded-xl border border-slate-100">
                <input type="hidden" id="memberEditIndex" value="-1">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                    <select id="gradeInput" class="px-3 py-2 border rounded-lg outline-none text-sm bg-white">
                        <option value="">所属を選択</option>
                        <option value="コーチ">コーチ</option>
                        <option value="6年">6年</option>
                        <option value="5年">5年</option>
                        <option value="4年">4年</option>
                        <option value="3年">3年</option>
                        <option value="2年">2年</option>
                        <option value="1年以下">1年以下</option>
                    </select>
                    <input type="text" id="memberInput" placeholder="氏名" class="px-3 py-2 border rounded-lg outline-none text-sm">
                </div>
                <div class="flex gap-2">
                    <button id="submitMemberBtn" onclick="addOrUpdateMember()" class="flex-1 btn-primary rounded-lg font-semibold">メンバーを登録</button>
                    <button id="cancelMemberEditBtn" onclick="resetMemberForm()" class="hidden px-4 bg-slate-200 text-slate-600 rounded-lg font-bold">中止</button>
                </div>
            </div>
            <div id="memberList" class="flex flex-wrap gap-2"></div>
        </section>

        <!-- Step 2: Expenses -->
        <section class="card p-6 mb-6 no-print" id="expenseFormSection">
            <h2 class="text-lg font-semibold mb-4 flex items-center text-slate-800">
                <span class="mr-2">📝</span> <span id="formTitleText">費用の記録</span>
            </h2>
            <div class="space-y-4">
                <input type="hidden" id="editIndex" value="-1">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">利用日</label>
                        <input type="date" id="expenseDate" class="w-full px-4 py-2 border rounded-lg outline-none bg-white text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">対象チーム</label>
                        <select id="expenseTeam" class="w-full px-4 py-2 border rounded-lg outline-none bg-white text-sm">
                            <option value="A">Aチーム</option>
                            <option value="B">Bチーム</option>
                            <option value="C">Cチーム</option>
                            <option value="D">Dチーム</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">項目</label>
                    <div class="flex flex-wrap gap-2 mb-2">
                        <button onclick="setExpenseTitle('配車代')" class="btn-chip">配車代</button>
                        <button onclick="setExpenseTitle('高速代')" class="btn-chip">高速代</button>
                        <button onclick="setExpenseTitle('審判代')" class="btn-chip">審判代</button>
                    </div>
                    <input type="text" id="expenseTitle" placeholder="費用項目を入力" class="w-full px-4 py-2 border rounded-lg outline-none text-sm">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">対象者</label>
                        <select id="payerSelect" class="w-full px-4 py-2 border rounded-lg outline-none bg-white text-sm">
                            <option value="">選択してください</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">金額 (¥)</label>
                        <input type="number" id="amountInput" placeholder="0" class="w-full px-4 py-2 border rounded-lg outline-none text-sm">
                    </div>
                </div>
                <div class="flex gap-2">
                    <button id="submitExpenseBtn" onclick="addExpense()" class="flex-1 btn-primary py-3 rounded-lg font-bold">＋ リストに追加</button>
                    <button id="cancelEditBtn" onclick="resetExpenseForm()" class="hidden px-4 bg-slate-200 text-slate-600 rounded-lg font-bold">中止</button>
                </div>
            </div>
        </section>

        <!-- Step 3: Summary Report -->
        <section class="card p-6 mb-6">
            <div class="flex flex-col gap-4 mb-6 no-print">
                <h2 class="text-lg font-semibold text-slate-800 flex items-center justify-between">
                    <span>📊 集計レポート</span>
                    <div class="flex gap-2">
                        <button onclick="exportToCSV()" class="text-[10px] bg-emerald-600 text-white px-3 py-1 rounded shadow-sm hover:bg-emerald-700 font-bold">CSVエクスポート</button>
                        <button onclick="window.print()" class="text-[10px] bg-red-600 text-white px-3 py-1 rounded shadow-sm hover:bg-red-700 font-bold">PDF保存 / 印刷</button>
                    </div>
                </h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 border-b border-slate-100 pb-4">
                    <div class="flex flex-wrap gap-2 items-center">
                        <span class="text-xs font-bold text-slate-400">チーム:</span>
                        <button onclick="setFilter('ALL')" id="filter-ALL" class="text-[10px] px-3 py-1 border rounded filter-active">全表示</button>
                        <button onclick="setFilter('A')" id="filter-A" class="text-[10px] px-3 py-1 border rounded">A</button>
                        <button onclick="setFilter('B')" id="filter-B" class="text-[10px] px-3 py-1 border rounded">B</button>
                        <button onclick="setFilter('C')" id="filter-C" class="text-[10px] px-3 py-1 border rounded">C</button>
                        <button onclick="setFilter('D')" id="filter-D" class="text-[10px] px-3 py-1 border rounded">D</button>
                    </div>
                    <div class="flex flex-wrap gap-2 items-center">
                        <span class="text-xs font-bold text-slate-400">期間:</span>
                        <select id="periodFilter" onchange="updatePeriodFilter(this.value)" class="text-[10px] px-2 py-1 border rounded bg-white outline-none">
                            <option value="ALL">全期間</option>
                            <option value="2-3">2月 - 3月</option>
                            <option value="4-5">4月 - 5月</option>
                            <option value="6-7">6月 - 7月</option>
                            <option value="8-9">8月 - 9月</option>
                            <option value="10-11">10月 - 11月</option>
                            <option value="12-1">12月 - 1月</option>
                        </select>
                    </div>
                </div>

                <div class="flex flex-wrap gap-2 items-center pt-2">
                    <span class="text-xs font-bold text-slate-400">費用種別:</span>
                    <button onclick="setCategoryFilter('ALL')" id="cat-ALL" class="text-[10px] px-3 py-1 border rounded filter-active">全費用</button>
                    <button onclick="setCategoryFilter('TRANSPORT')" id="cat-TRANSPORT" class="text-[10px] px-3 py-1 border rounded">配車・高速代</button>
                    <button onclick="setCategoryFilter('REFEREE')" id="cat-REFEREE" class="text-[10px] px-3 py-1 border rounded">審判代</button>
                </div>
            </div>

            <!-- Print Header -->
            <div class="hidden print-only mb-6 border-b-2 border-slate-800 pb-2">
                <h1 class="text-2xl font-bold text-slate-800">費用負担 集計報告書</h1>
                <p class="text-sm text-slate-600 mt-1" id="printReportLabel"></p>
            </div>

            <!-- Member Summary Display -->
            <div id="memberSummaryContainer" class="mb-8 bg-slate-50 p-5 rounded-2xl border border-slate-100">
                <div class="flex justify-between items-end mb-4">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">メンバー別 負担合計</h3>
                    <div class="text-right">
                        <div class="text-[10px] text-slate-400 font-bold mb-1">TOTAL SUM</div>
                        <div id="filteredTotalLabel" class="text-2xl font-black text-indigo-600 leading-none">¥0</div>
                    </div>
                </div>
                <div id="memberSummaryList" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <!-- Dynamic Member Totals -->
                </div>
            </div>

            <h3 class="text-xs font-bold text-slate-400 mb-4 uppercase tracking-widest no-print">負担履歴</h3>
            <div id="expenseHistory" class="space-y-2 max-h-[500px] overflow-y-auto pr-1">
                <p class="text-slate-400 text-center py-4 text-xs italic">記録はありません</p>
            </div>

            <div class="hidden print-only mt-10 pt-4 border-t border-slate-200 text-[10px] text-slate-400 text-center">
                Generated by Team Split | <span id="printTimestamp"></span>
            </div>
        </section>
    </div>

    <script>
        let members = []; 
        let expenses = []; 
        let currentFilter = 'ALL';
        let currentPeriodFilter = 'ALL'; 
        let currentCategoryFilter = 'ALL'; 

        const gradeOrder = {
            "コーチ": 1, "6年": 2, "5年": 3, "4年": 4, "3年": 5, "2年": 6, "1年以下": 7
        };

        window.onload = function() {
            const savedMembers = localStorage.getItem('ts_members');
            const savedExpenses = localStorage.getItem('ts_expenses');
            if (savedMembers) members = JSON.parse(savedMembers);
            if (savedExpenses) expenses = JSON.parse(savedExpenses);
            document.getElementById('expenseDate').valueAsDate = new Date();
            updateMemberUI();
            updateAll();
        };

        function saveData() {
            localStorage.setItem('ts_members', JSON.stringify(members));
            localStorage.setItem('ts_expenses', JSON.stringify(expenses));
        }

        function clearAllData() {
            if (confirm("すべてのデータを消去しますか？")) {
                localStorage.removeItem('ts_members');
                localStorage.removeItem('ts_expenses');
                members = []; expenses = [];
                updateMemberUI(); updateAll();
                showMessage("データをすべて削除しました");
            }
        }

        function setExpenseTitle(title) {
            document.getElementById('expenseTitle').value = title;
        }

        function setFilter(team) {
            currentFilter = team;
            document.querySelectorAll('[id^="filter-"]').forEach(btn => {
                btn.classList.toggle('filter-active', btn.id === `filter-${team}`);
            });
            updateAll();
        }

        function updatePeriodFilter(val) {
            currentPeriodFilter = val;
            updateAll();
        }

        function setCategoryFilter(cat) {
            currentCategoryFilter = cat;
            document.querySelectorAll('[id^="cat-"]').forEach(btn => {
                btn.classList.toggle('filter-active', btn.id === `cat-${cat}`);
            });
            updateAll();
        }

        function updateAll() {
            updateLabels();
            updateExpenseList();
            updateMemberSummary();
            document.getElementById('printTimestamp').textContent = new Date().toLocaleString();
        }

        function updateLabels() {
            let label = currentFilter === 'ALL' ? '全体' : `${currentFilter}チーム`;
            if (currentPeriodFilter !== 'ALL') label += ` ・ ${currentPeriodFilter}月期`;
            if (currentCategoryFilter === 'TRANSPORT') label += ' [配車・高速代]';
            if (currentCategoryFilter === 'REFEREE') label += ' [審判代]';
            document.getElementById('printReportLabel').textContent = label;
        }

        function updateMemberUI() {
            const list = document.getElementById('memberList');
            const payerSelect = document.getElementById('payerSelect');
            list.innerHTML = '';
            payerSelect.innerHTML = '<option value="">選択してください</option>';
            
            // 学年順・五十音順でソート
            const sortedMembersWithIndex = members.map((m, originalIdx) => ({...m, originalIdx}))
                .sort((a, b) => {
                    const orderA = gradeOrder[a.grade] || 99;
                    const orderB = gradeOrder[b.grade] || 99;
                    if (orderA !== orderB) return orderA - orderB;
                    return a.name.localeCompare(b.name, 'ja');
                });

            // セレクトボックスのグループ化
            const gradesInUse = [...new Set(members.map(m => m.grade))].sort((a, b) => (gradeOrder[a] || 99) - (gradeOrder[b] || 99));

            gradesInUse.forEach(grade => {
                const groupPay = document.createElement('optgroup');
                groupPay.label = grade;
                sortedMembersWithIndex.forEach(m => {
                    if (m.grade === grade) {
                        const optPay = document.createElement('option');
                        optPay.value = m.originalIdx;
                        optPay.textContent = m.name;
                        groupPay.appendChild(optPay);
                    }
                });
                if (groupPay.children.length > 0) payerSelect.appendChild(groupPay);
            });

            // バッジリストの表示
            sortedMembersWithIndex.forEach(m => {
                const badge = document.createElement('div');
                badge.className = `px-3 py-1 rounded-full flex items-center gap-2 border text-xs bg-white border-slate-200 text-slate-700 shadow-sm`;
                badge.innerHTML = `
                    <span class="font-medium text-[10px] text-indigo-500 mr-0.5">${m.grade}</span>
                    <span class="font-bold">${m.name}</span>
                    <div class="flex gap-1 no-print border-l pl-2 ml-1">
                        <button onclick="editMember(${m.originalIdx})" class="text-indigo-400 hover:text-indigo-600 font-bold" title="編集">✎</button>
                        <button onclick="removeMember(${m.originalIdx})" class="text-slate-300 hover:text-red-500 font-bold" title="削除">×</button>
                    </div>
                `;
                list.appendChild(badge);
            });
        }

        // 個別編集の開始
        function editMember(index) {
            const m = members[index];
            document.getElementById('gradeInput').value = m.grade || '';
            document.getElementById('memberInput').value = m.name;
            document.getElementById('memberEditIndex').value = index;
            document.getElementById('memberFormTitle').textContent = "メンバーを編集中...";
            document.getElementById('submitMemberBtn').textContent = "保存する";
            document.getElementById('submitMemberBtn').className = "flex-1 bg-emerald-600 text-white rounded-lg font-semibold hover:bg-emerald-700 transition-colors";
            document.getElementById('cancelMemberEditBtn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 編集フォームのリセット
        function resetMemberForm() {
            document.getElementById('gradeInput').value = '';
            document.getElementById('memberInput').value = '';
            document.getElementById('memberEditIndex').value = "-1";
            document.getElementById('memberFormTitle').textContent = "メンバー名簿";
            document.getElementById('submitMemberBtn').textContent = "メンバーを登録";
            document.getElementById('submitMemberBtn').className = "flex-1 btn-primary rounded-lg font-semibold";
            document.getElementById('cancelMemberEditBtn').classList.add('hidden');
        }

        function addOrUpdateMember() {
            const grade = document.getElementById('gradeInput').value;
            const name = document.getElementById('memberInput').value.trim();
            const editIdx = parseInt(document.getElementById('memberEditIndex').value);
            
            if (!grade || !name) { showMessage("所属と氏名を入力してください"); return; }
            
            if (editIdx > -1) {
                // 更新処理
                members[editIdx] = { grade, name };
                showMessage("メンバー情報を更新しました");
            } else {
                // 新規登録時の重複チェック
                if (members.some(m => m.name === name && m.grade === grade)) { 
                    showMessage("すでに登録されています"); 
                    return; 
                }
                members.push({ grade, name });
                showMessage(`${name}さんを登録しました`);
            }
            
            saveData(); 
            resetMemberForm(); 
            updateMemberUI(); 
            updateAll();
        }

        function removeMember(index) {
            const m = members[index];
            if (expenses.some(exp => exp.payerIndex === index)) { 
                showMessage(`${m.name}さんは支払い記録があるため削除できません`); 
                return; 
            }
            if (confirm(`${m.name}さんを削除しますか？`)) {
                members.splice(index, 1);
                // インデックスの整合性保持
                expenses.forEach(exp => { if (exp.payerIndex > index) exp.payerIndex--; });
                saveData(); updateMemberUI(); updateAll();
            }
        }

        function addExpense() {
            const date = document.getElementById('expenseDate').value;
            const title = document.getElementById('expenseTitle').value.trim();
            const payerIdx = parseInt(document.getElementById('payerSelect').value);
            const amount = parseFloat(document.getElementById('amountInput').value);
            const team = document.getElementById('expenseTeam').value;
            const editIndex = parseInt(document.getElementById('editIndex').value);

            if (!date || !title || isNaN(payerIdx) || isNaN(amount)) { showMessage("全ての項目を入力してください"); return; }
            
            if (editIndex > -1) {
                expenses[editIndex] = { date, title, payerIndex: payerIdx, amount, team };
                showMessage("記録を更新しました");
            } else {
                expenses.push({ date, title, payerIndex: payerIdx, amount, team });
            }
            saveData(); resetExpenseForm(); updateAll();
        }

        function editExpense(idx) {
            const exp = expenses[idx];
            document.getElementById('expenseDate').value = exp.date;
            document.getElementById('expenseTitle').value = exp.title;
            document.getElementById('payerSelect').value = exp.payerIndex;
            document.getElementById('amountInput').value = exp.amount;
            document.getElementById('expenseTeam').value = exp.team;
            document.getElementById('editIndex').value = idx;
            document.getElementById('formTitleText').textContent = "費用の編集";
            document.getElementById('submitExpenseBtn').textContent = "更新する";
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            document.getElementById('expenseFormSection').scrollIntoView({ behavior: 'smooth' });
        }

        function resetExpenseForm() {
            document.getElementById('expenseTitle').value = '';
            document.getElementById('amountInput').value = '';
            document.getElementById('editIndex').value = "-1";
            document.getElementById('formTitleText').textContent = "費用の記録";
            document.getElementById('submitExpenseBtn').textContent = "＋ リストに追加";
            document.getElementById('cancelEditBtn').classList.add('hidden');
        }

        function getFilteredExpenses() {
            return expenses.filter(exp => {
                const teamMatch = currentFilter === 'ALL' || exp.team === currentFilter;
                if (!teamMatch) return false;
                if (currentPeriodFilter !== 'ALL') {
                    const month = new Date(exp.date).getMonth() + 1;
                    const targetMonths = currentPeriodFilter.split('-').map(m => parseInt(m));
                    if (!targetMonths.includes(month)) return false;
                }
                if (currentCategoryFilter === 'TRANSPORT') {
                    if (!exp.title.includes('配車') && !exp.title.includes('高速')) return false;
                } else if (currentCategoryFilter === 'REFEREE') {
                    if (!exp.title.includes('審判')) return false;
                }
                return true;
            });
        }

        function updateExpenseList() {
            const container = document.getElementById('expenseHistory');
            const filtered = getFilteredExpenses();
            if (filtered.length === 0) {
                container.innerHTML = '<p class="text-slate-400 text-center py-4 text-xs italic">該当する記録はありません</p>';
                return;
            }
            container.innerHTML = filtered.map((exp) => {
                const target = members[exp.payerIndex];
                const realIdx = expenses.indexOf(exp);
                return `
                    <div class="flex justify-between items-center p-3 bg-slate-50 rounded-lg border border-slate-100">
                        <div class="text-[10px]">
                            <div class="flex items-center gap-2">
                                <span class="bg-indigo-100 text-indigo-700 px-1 rounded font-bold">${exp.team}</span>
                                <span class="text-slate-400">${exp.date}</span>
                            </div>
                            <div class="font-bold text-slate-800 text-sm mt-0.5">${exp.title}</div>
                            <div class="text-slate-500 font-medium">対象者: ${target ? target.name : '削除済'} (¥${exp.amount.toLocaleString()})</div>
                        </div>
                        <div class="flex gap-3 no-print">
                            <button onclick="editExpense(${realIdx})" class="text-indigo-500 hover:text-indigo-700 text-xs font-bold">編集</button>
                            <button onclick="removeExpense(${realIdx})" class="text-red-400 hover:text-red-600 text-xs font-bold">削除</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateMemberSummary() {
            const filtered = getFilteredExpenses();
            const totalLabel = document.getElementById('filteredTotalLabel');
            const list = document.getElementById('memberSummaryList');
            const totals = Array(members.length).fill(0);
            let filteredTotal = 0;
            
            filtered.forEach(exp => {
                if (totals[exp.payerIndex] !== undefined) {
                    totals[exp.payerIndex] += exp.amount;
                    filteredTotal += exp.amount;
                }
            });
            totalLabel.textContent = `¥${filteredTotal.toLocaleString()}`;

            if (members.length === 0) {
                list.innerHTML = '<p class="col-span-full text-slate-400 text-center text-[10px]">メンバーが登録されていません</p>';
                return;
            }

            const sortedSummary = members.map((m, idx) => ({...m, total: totals[idx]}))
                .sort((a, b) => (gradeOrder[a.grade] || 99) - (gradeOrder[b.grade] || 99) || a.name.localeCompare(b.name, 'ja'));

            list.innerHTML = sortedSummary.map((m) => `
                <div class="flex justify-between items-center bg-white p-3 px-4 rounded-xl border border-slate-200 shadow-sm">
                    <div class="flex flex-col">
                        <span class="text-[9px] font-bold text-slate-400 leading-none mb-1">${m.grade}</span>
                        <span class="text-xs font-bold text-slate-700">${m.name}</span>
                    </div>
                    <span class="text-sm font-black ${m.total > 0 ? 'text-indigo-600' : 'text-slate-300'}">¥${m.total.toLocaleString()}</span>
                </div>
            `).join('');
        }

        function removeExpense(idx) {
            if (confirm("この記録を削除しますか？")) {
                expenses.splice(idx, 1);
                saveData(); updateAll();
            }
        }

        function exportToCSV() {
            const csvContent = "TYPE,FULL_EXPORT_v1\n利用日,対象チーム,項目,対象者,学年/所属,金額(円)\n" + 
                expenses.map(exp => {
                    const target = members[exp.payerIndex] || {name: '不明', grade: '-'};
                    return `EXPENSE,${exp.date},${exp.team},"${exp.title.replace(/"/g, '""')}","${target.name.replace(/"/g, '""')}",${target.grade},${exp.amount}`;
                }).join("\n") + 
                "\n--- MEMBERS ---\n学年/所属,氏名\n" + 
                members.map(m => `MEMBER,${m.grade},"${m.name.replace(/"/g, '""')}"`).join("\n");
            
            const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
            const blob = new Blob([bom, csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `team_split_backup_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }

        function downloadMemberTemplate() {
            const csvContent = "学年/所属,氏名\nコーチ,コーチA\n6年,選手太郎\n5年,選手次郎\n";
            const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
            const blob = new Blob([bom, csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `member_template.csv`;
            link.click();
            showMessage("テンプレートをダウンロードしました (BOM付UTF-8)");
        }

        function importDataFromCSV(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const lines = text.split(/\r?\n/);
                if (lines[0].includes("FULL_EXPORT")) {
                    if (!confirm("既存のデータをすべて上書きして復元しますか？")) return;
                    const newMembers = []; const newExpenses = []; const tempMap = {};
                    lines.forEach(line => {
                        const p = line.split(',');
                        if (p[0] === "MEMBER") {
                            newMembers.push({ grade: p[1], name: p[2].replace(/^"|"$/g, '') });
                            tempMap[`${p[1]}-${p[2].replace(/^"|"$/g, '')}`] = newMembers.length - 1;
                        }
                    });
                    lines.forEach(line => {
                        const p = line.split(',');
                        if (p[0] === "EXPENSE") {
                            const idx = tempMap[`${p[5]}-${p[4].replace(/^"|"$/g, '')}`];
                            if (idx !== undefined) newExpenses.push({ date: p[1], team: p[2], title: p[3].replace(/^"|"$/g, ''), payerIndex: idx, amount: parseFloat(p[6]) });
                        }
                    });
                    members = newMembers; expenses = newExpenses;
                    saveData(); updateMemberUI(); updateAll(); showMessage("バックアップから復元しました");
                }
            };
            reader.readAsText(file);
        }

        function showMessage(msg) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-2xl text-sm z-50 shadow-2xl';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function handleCSV(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const lines = text.split(/\r?\n/);
                let added = 0;
                lines.forEach(line => {
                    if (line.includes("学年/所属") || line.trim() === "") return;
                    const p = line.split(',');
                    if (p.length < 2) return;
                    const g = p[0].trim().replace(/^\uFEFF/, '');
                    const n = p[1]?.trim().replace(/^"|"$/g, '');
                    if (n && gradeOrder[g] && !members.some(m => m.name === n && m.grade === g)) {
                        members.push({ grade: g, name: n });
                        added++;
                    }
                });
                saveData(); updateMemberUI(); updateAll(); showMessage(`${added}名の新規メンバーを追加しました`);
                input.value = ""; 
            };
            reader.readAsText(file);
        }
    </script>
<script>
// Service Worker登録
if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      const reg = await navigator.serviceWorker.register('./service-worker.js');

      // 更新検知
      reg.onupdatefound = () => {
        const newWorker = reg.installing;
        newWorker.onstatechange = () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateToast();
          }
        };
      };

    } catch (err) {
      console.log(err);
    }
  });
}

// 更新通知
function showUpdateToast() {
  const toast = document.createElement('div');
  toast.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-indigo-600 text-white px-6 py-3 rounded-xl z-50';
  toast.innerHTML = '新しいバージョンがあります <button onclick="updateApp()" class="underline ml-2">更新</button>';
  document.body.appendChild(toast);
}

function updateApp() {
  navigator.serviceWorker.getRegistration().then(reg => {
    if (reg.waiting) {
      reg.waiting.postMessage({ type: 'SKIP_WAITING' });
    }
    location.reload();
  });
}
</script>
